<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOALIE - Start Scene</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@900&family=Kanit:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="mobile-screen">
        <div class="bg-items"></div>

     <div id="start-scene" class="screen">
        <div class="header-area">
            <svg viewBox="0 0 500 200">
                <defs>
                    <path id="curve" d="M 50,150 A 250,250 0 0,1 450,150" fill="transparent"/>
                </defs>
                <text class="goalie-text" font-family="'Rubik'" font-weight="900" text-anchor="middle">
                    <textPath xlink:href="#curve" startOffset="50%">
                        GOALIE
                    </textPath>
                </text>
            </svg>
        </div>

        <div class="visual-area">
            <img src="capibaracoin.png" class="coin coin-1">
            <img src="capibaracoin.png" class="coin coin-2">
            <img src="capibaracoin.png" class="coin coin-3">
            <img src="basket.png" class="basket-img">
        </div>

        <div class="star">
            <span> ★ </span><span> ★ </span><span> ★ </span><span> ★ </span><span> ★ </span>
        </div> 
             <button id="btn-go" class="btn-start">LET'S GO</button>
    </div>

        <div id="setup-scene" class="hidden">
    <div class="bg-items"></div>

    <div class="header-area-s2">
        <h1 class="title-s2">CALCULATING</h1>
        <h1 class="title-s2">SETUP!</h1>
    </div>

    <div class="button-group">
        <button class="btn-choice" id="btn-manual">
            I've got<br>this
        </button>
        
        <button class="btn-choice" id="btn-auto">
            Leave it<br>to us
        </button>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
