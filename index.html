<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOALIE - Start Scene</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700&family=Kanit:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="mobile-screen">
        <div class="bg-items"></div>

        <div class="logo-container">
        <svg viewBox="0 0 500 200">
            <defs>
                <path id="curve" d="M 50,150 A 250,250 0 0,1 450,150" fill="transparent"/>
            </defs>
            <text class="goalie-text" font-family="'Rubik'" font-weight="900" font-size="50">
                <textPath xlink:href="#curve" startOffset="50%" text-anchor="middle">
                    GOALIE
                </textPath>
            </text>
        </svg>
    </div>

            <div class="main-visual">
                <div class="basket-container">
                    <img src="capibaracoin.png" class="coin coin-1">
                    <img src="capibaracoin.png" class="coin coin-2">
                    <img src="capibaracoin.png" class="coin coin-3">
                    <img src="basket.png" class="basket">
                </div>
            </div>

            <div class="rating-stars">
                <span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
            </div>

            <button class="btn-start">LET'S GO</button>
        </div>
    </div>

</body>
</html>
